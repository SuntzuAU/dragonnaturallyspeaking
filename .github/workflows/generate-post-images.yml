
name: Generate Post Images

on:
  workflow_dispatch:
    inputs:
      post_slug:
        description: 'Post filename (e.g. dragon-medical-upgrade.md) - leave blank for most recent'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find target post
        id: find_post
        run: |
          if [ -n "${{ github.event.inputs.post_slug }}" ]; then
            POST_FILE="src/content/news/${{ github.event.inputs.post_slug }}"
          else
            POST_FILE=$(ls src/content/news/*.md | grep -v '_placeholder' | sort | tail -1)
          fi
          echo "post_file=$POST_FILE" >> $GITHUB_OUTPUT
          echo "Target post: $POST_FILE"

      - name: Check if images already exist
        id: check_images
        run: |
          POST_FILE="${{ steps.find_post.outputs.post_file }}"
          if grep -q "^heroImage:" "$POST_FILE"; then
            echo "Images already exist - skipping generation"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "No images found - proceeding"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract post metadata
        id: metadata
        if: steps.check_images.outputs.skip == 'false'
        run: |
          POST_FILE="${{ steps.find_post.outputs.post_file }}"
          TITLE=$(grep "^title:" "$POST_FILE" | head -1 | sed 's/title: //' | tr -d '"')
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Build image prompts
        id: prompts
        if: steps.check_images.outputs.skip == 'false'
        run: |
          python3 << 'PYEOF'
          import random, os

          title = os.environ.get("TITLE", "Dragon speech recognition software")

          settings = [
            "Australian medical clinic interior",
            "modern hospital administration office",
            "GP practice consultation room Australia",
            "specialist medical rooms Sydney",
            "corporate legal office Australia",
            "professional services firm open plan office",
          ]

          hero_compositions = [
            "doctor smiling at camera wearing Bluetooth headset at desk with laptop",
            "clinician dictating into microphone at computer in modern clinic",
            "medical professional reviewing patient notes on screen looking satisfied",
            "doctor and receptionist collaborating at front desk with computers",
            "specialist dictating clinical notes hands-free in consultation room",
          ]

          break_compositions = [
            "close up of medical software interface on screen sharp focus",
            "doctor typing notes beside speech recognition microphone on desk",
            "laptop screen showing clinical documentation software in clinic",
            "hands-free microphone on desk beside stethoscope and notepad",
            "close up of EHR patient record on modern desktop monitor",
          ]

          lighting = [
            "warm natural window light",
            "cool professional clinical lighting",
            "bright modern workspace lighting",
            "soft diffused overcast light",
          ]

          style = "photorealistic photography, Canon 5D quality, no text overlays, no diagrams, no clipart"

          s = random.choice(settings)
          c = random.choice(hero_compositions)
          l = random.choice(lighting)
          hero = f"{c}, {s}, {l}, context: {title}, {style}"

          s2 = random.choice([x for x in settings if x != s])
          c2 = random.choice(break_compositions)
          l2 = random.choice([x for x in lighting if x != l])
          break1 = f"{c2}, {s2}, {l2}, {style}"

          s3 = random.choice([x for x in settings if x != s and x != s2])
          c3 = random.choice([x for x in break_compositions if x != c2])
          l3 = random.choice(lighting)
          break2 = f"{c3}, {s3}, {l3}, {style}"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"hero={hero}\n")
            f.write(f"break1={break1}\n")
            f.write(f"break2={break2}\n")

          print(f"Hero: {hero}")
          print(f"Break1: {break1}")
          print(f"Break2: {break2}")
          PYEOF
        env:
          TITLE: ${{ steps.metadata.outputs.title }}

      - name: Generate hero image
        id: hero
        if: steps.check_images.outputs.skip == 'false'
        run: |
          RESPONSE=$(curl -s -X POST "https://master-image-generator.speech-recognition-cloud.workers.dev/generate" \
            -H "Content-Type: application/json" \
            -d "{\"prompt\": \"${{ steps.prompts.outputs.hero }}\", \"name\": \"hero\"}")
          KEY=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['r2']['key'])" 2>/dev/null)
          if [ -z "$KEY" ]; then echo "ERROR: Hero failed. Response: $RESPONSE"; exit 1; fi
          echo "key=$KEY" >> $GITHUB_OUTPUT

      - name: Generate break image 1
        id: break1
        if: steps.check_images.outputs.skip == 'false'
        run: |
          RESPONSE=$(curl -s -X POST "https://master-image-generator.speech-recognition-cloud.workers.dev/generate" \
            -H "Content-Type: application/json" \
            -d "{\"prompt\": \"${{ steps.prompts.outputs.break1 }}\", \"name\": \"break1\"}")
          KEY=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['r2']['key'])" 2>/dev/null)
          if [ -z "$KEY" ]; then echo "ERROR: Break1 failed. Response: $RESPONSE"; exit 1; fi
          echo "key=$KEY" >> $GITHUB_OUTPUT

