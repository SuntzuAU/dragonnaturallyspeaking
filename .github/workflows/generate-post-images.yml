name: Generate Post Images

on:
  workflow_dispatch:
    inputs:
      post_slug:
        description: 'Post filename (e.g. dragon-medical-upgrade.md) - leave blank for most recent'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find target post
        id: find_post
        run: |
          if [ -n "${{ github.event.inputs.post_slug }}" ]; then
            POST_FILE="src/content/news/${{ github.event.inputs.post_slug }}"
          else
            POST_FILE=$(ls src/content/news/*.md | grep -v '_placeholder' | sort | tail -1)
          fi
          echo "post_file=$POST_FILE" >> $GITHUB_OUTPUT
          echo "Target post: $POST_FILE"

      - name: Check if images already exist
        id: check_images
        run: |
          POST_FILE="${{ steps.find_post.outputs.post_file }}"
          if grep -q "^heroImage:" "$POST_FILE"; then
            echo "Images already exist - skipping generation"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "No images found - proceeding"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate all images and update post
        if: steps.check_images.outputs.skip == 'false'
        env:
          POST_FILE: ${{ steps.find_post.outputs.post_file }}
          WORKER_URL: https://master-image-generator.speech-recognition-cloud.workers.dev/generate
        run: |
          python3 << 'PYEOF'
          import random, os, json, urllib.request, re

          post_file = os.environ["POST_FILE"]
          worker_url = os.environ["WORKER_URL"]

          with open(post_file) as f:
              content = f.read()

          def fm_field(name):
              m = re.search(rf'^{name}:\s*"?([^"\n]+)"?', content, re.MULTILINE)
              return m.group(1).strip() if m else ""

          title = fm_field("title") or post_file
          site_name = "Dragon NaturallySpeaking Australia"

          # IMPORTANT: Prompts engineered to avoid Gemini failure modes.
          # Never name software/brands - Gemini renders them as logos on screens.
          # Never ask for screen/UI shots - produces mockups.
          # Always specify positive emotion for hero. Always end with NEGATIVE list.

          NEGATIVE = (
              "photorealistic DSLR photography, natural candid feel, "
              "NO logos, NO brand names, NO text on screens, NO UI mockups, NO app interfaces, "
              "NO stock photo poses, NO diagrams, NO charts, NO illustrations, NO clipart"
          )

          hero_scenes = [
              "doctor smiling warmly at colleague while gesturing toward laptop on desk, modern clinic",
              "two medical professionals having a positive conversation in a bright modern consultation room",
              "confident GP at a clean modern desk looking relaxed and satisfied, warm natural light",
              "clinician in smart attire walking through a bright modern hospital corridor, looking purposeful and positive",
              "small medical team smiling and collaborating around a table in a light-filled meeting room",
          ]

          break_scenes = [
              "close-up of clean modern desk with laptop and stethoscope in warm natural light, shallow depth of field",
              "bright modern medical administration office, empty, clean, glass partitions, plants",
              "hands resting on laptop keyboard in a tidy well-lit clinic environment",
              "wide shot of a modern Australian healthcare office with natural light flooding in",
              "professional leather notebook and pen beside a laptop on a clean wooden desk, soft light",
          ]

          settings = [
              "modern Sydney CBD medical rooms with harbour view",
              "contemporary Melbourne specialist clinic interior",
              "bright Australian private hospital administration office",
              "clean modern GP practice in suburban Australia",
              "light-filled Australian healthcare professional workspace",
          ]

          hero_scene = random.choice(hero_scenes)
          break_scene1 = random.choice(break_scenes)
          break_scene2 = random.choice([s for s in break_scenes if s != break_scene1])
          setting1 = random.choice(settings)
          setting2 = random.choice([s for s in settings if s != setting1])
          setting3 = random.choice([s for s in settings if s != setting1 and s != setting2])

          prompts = {
              "heroImage":   (f"{hero_scene}, {setting1}. Editorial context: {site_name}. {NEGATIVE}", "hero"),
              "breakImage1": (f"{break_scene1}, {setting2}. {NEGATIVE}", "break1"),
              "breakImage2": (f"{break_scene2}, {setting3}. {NEGATIVE}", "break2"),
          }

          def call_worker(prompt, name):
              payload = json.dumps({"prompt": prompt, "name": name}).encode()
              req = urllib.request.Request(
                  worker_url,
                  data=payload,
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )
              with urllib.request.urlopen(req, timeout=60) as resp:
                  return json.loads(resp.read())

          new_content = content
          for field, (prompt, slug) in prompts.items():
              print(f"Generating {field}...")
              print(f"  Prompt: {prompt}")
              result = call_worker(prompt, slug)
              if not result.get("ok"):
                  raise RuntimeError(f"Worker failed for {field}: {result}")
              r2_key = result["r2"]["key"]
              print(f"  R2 key: {r2_key}")
              existing = re.search(rf'^{field}:.*$', new_content, re.MULTILINE)
              if existing:
                  new_content = re.sub(rf'^{field}:.*$', f'{field}: "{r2_key}"', new_content, flags=re.MULTILINE)
              else:
                  new_content = re.sub(
                      r'^(metaDescription:[ \t]*.*)$',
                      rf'\1\n{field}: "{r2_key}"',
                      new_content,
                      count=1,
                      flags=re.MULTILINE
                  )

          with open(post_file, "w") as f:
              f.write(new_content)

          print("Done. Post updated.")
          PYEOF

      - name: Commit updated post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/news/
          git diff --staged --quiet || git commit -m "Add generated images to ${{ steps.find_post.outputs.post_file }}"
          git push
